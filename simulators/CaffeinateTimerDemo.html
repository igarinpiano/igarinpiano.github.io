<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caffeinate Timer Demo</title>
  <style>
    /* ターミナル風のスタイリング */
    body {
      background-color: #1e1e1e;
      color: #cccccc;
      font-family: 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace;
      margin: 0;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    #terminal-output {
      counter-reset: line-counter;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    /* 行番号付き行ブロック */
    .line {
      display: block;
      position: relative;
      white-space: pre;
      padding-left: 4em;
      min-height: 1.5em;
      /* 空行が潰れないように */
    }

    .line::before {
      counter-increment: line-counter;
      content: counter(line-counter);
      position: absolute;
      left: 0;
      width: 3.2em;
      text-align: right;
      color: #444;
      user-select: none;
      pointer-events: none;
    }

    /* 文字色・装飾クラス */
    .bold {
      font-weight: bold;
    }

    .cyan {
      color: #00ffff;
    }

    .green {
      color: #10b981;
    }

    /* ターミナルの緑に寄せる */
    .yellow {
      color: #facc15;
    }

    .red {
      color: #ef4444;
    }

    a {
      color: #00ffff;
      text-decoration: underline;
    }

    a:hover {
      color: #fff;
    }

    /* 入力エリアのスタイリング */
    #input-area {
      display: flex;
      align-items: center;
      margin-top: 5px;
      white-space: nowrap;
    }

    #prompt-label {
      margin-right: 5px;
    }

    #user-input {
      background: transparent;
      color: #cccccc;
      border: 1px solid #333;
      border-radius: 4px;
      outline: none;
      font-family: inherit;
      font-size: inherit;
      padding: 4px 8px;
      flex-grow: 1;
      max-width: 200px;
    }

    #user-input:focus {
      border-color: #00ffff;
    }

    .btn {
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px 12px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      margin-left: 8px;
      white-space: nowrap;
    }

    .btn:active {
      background-color: #555;
    }

    .btn-interrupt {
      background-color: #451a1a;
      color: #facc15;
      border-color: #7f1d1d;
    }

    .btn-interrupt:active {
      background-color: #7f1d1d;
    }
  </style>
</head>

<body>

  <div id="terminal-output"></div>

  <div id="input-area">
    <span id="prompt-label">入力:</span>
    <input type="text" id="user-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="submit-btn" class="btn">送信</button>
    <button id="interrupt-btn" class="btn btn-interrupt" style="display: none;">中断 (Ctrl+C)</button>
  </div>

  <script>
    const outputDiv = document.getElementById('terminal-output');
    const inputArea = document.getElementById('input-area');
    const promptLabel = document.getElementById('prompt-label');
    const userInput = document.getElementById('user-input');
    const submitBtn = document.getElementById('submit-btn');
    const interruptBtn = document.getElementById('interrupt-btn');

    let currentState = 'INIT'; // 'INIT', 'INPUT', 'RUNNING', 'WAIT_CLOSE'
    let timerId = null;

    // --- ユーティリティ関数 ---

    // ユーザー入力のHTMLエスケープ (XSS対策)
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // 部分行バッファ: \n で終わらない出力を次のprint呼び出しまで保持
    let lineBuffer = '';

    // ターミナルへ出力 (innerHTML += を避け、行ごとにdivをappendChild)
    function print(htmlStr) {
      const combined = lineBuffer + htmlStr;
      const parts = combined.split('\n');

      // 最後の要素は改行前の未確定部分
      for (let i = 0; i < parts.length - 1; i++) {
        const div = document.createElement('div');
        div.className = 'line';
        div.innerHTML = parts[i]; // 開発者が生成した信頼済みHTML
        outputDiv.appendChild(div);
      }

      lineBuffer = parts[parts.length - 1];
      window.scrollTo(0, document.body.scrollHeight);
    }

    // 日付フォーマット (YYYY-MM-DD HH:MM:SS)
    function formatDate(date) {
      const pad = n => n.toString().padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    // 時刻フォーマット (HH:MM:SS)
    function formatTime(date) {
      const pad = n => n.toString().padStart(2, '0');
      return `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    // 継続時間フォーマット (HH:MM:SS)
    function formatDuration(sec) {
      const pad = n => n.toString().padStart(2, '0');
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    // 全角→半角変換 (Bashスクリプトのsed相当)
    function toHalfWidth(str) {
      const map = {
        '０': '0', '１': '1', '２': '2', '３': '3', '４': '4',
        '５': '5', '６': '6', '７': '7', '８': '8', '９': '9',
        '：': ':', '．': '.', 'ｈ': 'h', 'ｍ': 'm', 'ｓ': 's', '　': ' '
      };
      return str.replace(/[０-９：．ｈｍｓ　]/g, match => map[match]);
    }

    // --- メインロジック ---

    function startTerminal() {
      outputDiv.innerHTML = '';
      lineBuffer = ''; // バッファもリセット
      currentState = 'INPUT';

      // 指示されたヘッダーテキスト
      print(`Copyright &copy; 2026 Igarin. All rights reserved.\n`);
      print(`このサイトはデモ用です。\n`);
      print(`スクリプトの詳細は<a href="https://github.com/igarinpiano/caffeinate-timer" target="_blank">https://github.com/igarinpiano/caffeinate-timer</a>をご覧ください。\n\n`);

      // オリジナルのスクリプトヘッダー
      print(`<span class="bold cyan">☕  Caffeinate タイマー</span>\n`);
      print(`<span class="cyan">────────────────────────────────────────</span>\n\n`);
      print(`<span class="bold">時間を入力してください。</span>\n`);
      print(`例:\n`);
      print(`  <span class="cyan">90</span>           → 90分\n`);
      print(`  <span class="cyan">1:30:00</span>      → 1時間30分0秒\n`);
      print(`  <span class="cyan">1:30</span>         → 1分30秒\n`);
      print(`  <span class="cyan">1h / 1hour</span>   → 1時間\n`);
      print(`  <span class="cyan">45m / 45min</span>  → 45分\n`);
      print(`  <span class="cyan">20s / 20sec</span>  → 20秒\n`);
      print(`  <span class="cyan">1h30m20s</span>     → 1時間30分20秒\n`);
      print(`  <span class="cyan">1h20s</span>        → 1時間20秒\n`);
      print(`  <span class="cyan">1.5h</span>         → 1時間30分\n\n`);

      resetInputArea('入力: ');
    }

    function resetInputArea(promptStr) {
      promptLabel.innerText = promptStr;
      userInput.value = '';
      userInput.style.display = 'inline-block';
      submitBtn.style.display = 'inline-block';
      interruptBtn.style.display = 'none';
      userInput.focus();
    }

    function processInput(rawValue) {
      if (currentState === 'WAIT_CLOSE') {
        startTerminal(); // Enterで閉じる... の後は再スタート
        return;
      }

      if (currentState !== 'INPUT') return;

      // エコーバック (ユーザー入力はエスケープしてXSSを防ぐ)
      print(`入力: ${escapeHtml(rawValue)}\n\n`);

      // 1. 全角→半角変換
      let val = toHalfWidth(rawValue);
      // 2. スペース除去・小文字化
      val = val.replace(/ /g, '').toLowerCase();
      // 3. 単位正規化
      val = val.replace(/hours?/g, 'h').replace(/hrs?/g, 'h')
        .replace(/minutes?/g, 'm').replace(/mins?/g, 'm')
        .replace(/seconds?/g, 's').replace(/secs?/g, 's');

      let seconds = 0;
      let match;

      // パターンマッチング (Bashスクリプトの挙動を再現)
      if ((match = val.match(/^(\d+)$/))) {
        seconds = parseInt(match[1], 10) * 60; // 1) 整数のみ → 分
      } else if ((match = val.match(/^(\d+)\.(\d+)$/))) {
        seconds = Math.floor(parseFloat(val) * 60); // 2) 小数のみ → 分
      } else if ((match = val.match(/^(\d+):(\d+)$/))) {
        seconds = parseInt(match[1], 10) * 60 + parseInt(match[2], 10); // 3) X:Y → 分:秒
      } else if ((match = val.match(/^(\d+):(\d+):(\d+)$/))) {
        seconds = parseInt(match[1], 10) * 3600 + parseInt(match[2], 10) * 60 + parseInt(match[3], 10); // 4) X:Y:Z → 時:分:秒
      } else if ((match = val.match(/^(\d+)\.(\d+)h$/))) {
        seconds = Math.floor(parseFloat(val.replace('h', '')) * 3600); // 5) 小数h → 時間
      } else if ((match = val.match(/^(\d+)h(\d+)m(\d+)s$/))) {
        seconds = parseInt(match[1], 10) * 3600 + parseInt(match[2], 10) * 60 + parseInt(match[3], 10); // 6) XhYmZs
      } else if ((match = val.match(/^(\d+)h(\d+)m$/))) {
        seconds = parseInt(match[1], 10) * 3600 + parseInt(match[2], 10) * 60; // 7) XhYm
      } else if ((match = val.match(/^(\d+)h(\d+)s$/))) {
        seconds = parseInt(match[1], 10) * 3600 + parseInt(match[2], 10); // 8) XhYs
      } else if ((match = val.match(/^(\d+)m(\d+)s$/))) {
        seconds = parseInt(match[1], 10) * 60 + parseInt(match[2], 10); // 9) XmYs
      } else if ((match = val.match(/^(\d+)h$/))) {
        seconds = parseInt(match[1], 10) * 3600; // 10) Xh
      } else if ((match = val.match(/^(\d+)m$/))) {
        seconds = parseInt(match[1], 10) * 60; // 11) Xm
      } else if ((match = val.match(/^(\d+)s$/))) {
        seconds = parseInt(match[1], 10); // 12) Xs
      } else {
        // パース失敗
        print(`<span class="red">❌ 入力形式がわかりませんでした。</span>\n`);
        print(`例: <span class="cyan">90 / 1:30 / 1:30:00 / 45m / 1h / 1.5h / 1h30m20s</span>\n\n`);
        waitClose();
        return;
      }

      // 0秒チェック
      if (seconds <= 0) {
        print(`<span class="red">❌ 0秒以下の値は設定できません。</span>\n\n`);
        waitClose();
        return;
      }

      startCaffeinate(seconds);
    }

    function startCaffeinate(seconds) {
      currentState = 'RUNNING';

      const now = new Date();
      const end = new Date(now.getTime() + seconds * 1000);
      const durationStr = formatDuration(seconds);

      print(`<span class="cyan">────────────────────────────────────────</span>\n`);
      print(`  <span class="bold">現在時刻:</span> <span class="green">${formatDate(now)}</span>\n`);
      print(`  <span class="bold">終了時刻:</span> <span class="green">${formatDate(end)}</span>\n`);
      print(`  <span class="bold">継続時間:</span> <span class="cyan">${durationStr}</span>  (${seconds}秒)\n`);
      print(`<span class="cyan">────────────────────────────────────────</span>\n\n`);
      print(`<span class="yellow">💡 スリープを防止しています... (Ctrl+C で中断)</span>\n\n`);

      // UIの切り替え (入力を隠して中断ボタンを表示)
      userInput.style.display = 'none';
      submitBtn.style.display = 'none';
      interruptBtn.style.display = 'inline-block';
      promptLabel.innerText = '実行中...';

      // 実際の待機処理 (デモのため実時間待機します)
      timerId = setTimeout(() => {
        print(`<span class="green">✅ 終了しました。 (${formatTime(new Date())})</span>\n\n`);
        waitClose();
      }, seconds * 1000);
    }

    function interruptCaffeinate() {
      if (currentState !== 'RUNNING') return;
      clearTimeout(timerId);

      print(`\n<span class="yellow">⚠️  中断されました。スリープ防止を解除します。</span>\n\n`);
      waitClose();
    }

    function waitClose() {
      currentState = 'WAIT_CLOSE';
      resetInputArea('Enterで閉じる...');
      interruptBtn.style.display = 'none';

      // スマホユーザーのために「送信」を「閉じる」テキストに変更
      submitBtn.innerText = '閉じる (最初からやり直す)';
    }

    // --- イベントリスナー ---

    submitBtn.addEventListener('click', () => {
      if (currentState === 'WAIT_CLOSE') {
        submitBtn.innerText = '送信';
      }
      processInput(userInput.value);
    });

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        if (currentState === 'WAIT_CLOSE') {
          submitBtn.innerText = '送信';
        }
        processInput(userInput.value);
      }
    });

    interruptBtn.addEventListener('click', interruptCaffeinate);

    // Ctrl+C キーボードショートカット: RUNNING 中のみ中断、それ以外はブラウザの標準動作を維持
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'c' && currentState === 'RUNNING') {
        e.preventDefault();
        interruptCaffeinate();
      }
    });

    // 初期化
    startTerminal();
  </script>

</body>

</html>

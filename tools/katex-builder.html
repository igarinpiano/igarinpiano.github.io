<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ж•°ејҸгӮӯгғјгғңгғјгғү</title>
    <!-- MathQuill (йҖҡеёё script src вҶ’ file:// гҒ§гӮӮеӢ•дҪң) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #f2f2f7;
            display: flex;
            flex-direction: column;
        }

        /* в”Җв”Җ Editor в”Җв”Җ */
        .editor-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px 12px 10px;
            gap: 8px;
        }

        #math-input {
            width: 100%;
            min-height: 72px;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1.5px solid #c8c8cc;
            background: white;
            cursor: text;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .07);
            display: flex;
            align-items: center;
        }

        #math-input.mq-focused {
            border-color: #007AFF;
        }

        /* MathQuill font size override */
        #math-input .mq-root-block {
            font-size: 28px;
            min-height: 40px;
        }

        #math-input .mq-root-block * {
            font-size: inherit;
        }

        .strip {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .latex-out {
            flex: 1;
            font-family: 'SF Mono', ui-monospace, monospace;
            font-size: 11px;
            color: #8e8e93;
            background: #e5e5ea;
            border-radius: 7px;
            padding: 6px 10px;
            word-break: break-all;
            min-height: 28px;
            line-height: 1.6;
        }

        .btn {
            flex-shrink: 0;
            padding: 7px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            transition: filter .1s, transform .1s;
        }

        .btn:active {
            filter: brightness(.85);
            transform: scale(.96);
        }

        .btn-p {
            background: #007AFF;
            color: white;
        }

        .btn-c {
            background: #c7c7cc;
            color: #1c1c1e;
        }

        /* в”Җв”Җ Keyboard в”Җв”Җ */
        #keyboard {
            width: 100%;
            background: #d1d1d6;
            padding: 6px 7px 14px;
            flex-shrink: 0;
        }

        .util-bar {
            display: flex;
            justify-content: flex-end;
            gap: 5px;
            margin-bottom: 5px;
        }

        .util-btn {
            width: 36px;
            height: 34px;
            background: #aeaeb2;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 0 rgba(0, 0, 0, .3);
            color: #1c1c1e;
            user-select: none;
        }

        .util-btn:active {
            background: #8e8e93;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, .45);
            border-radius: 8px;
            padding: 2px;
            margin-bottom: 6px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 5px 2px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #3c3c43;
            user-select: none;
        }

        .tab.on {
            background: #007AFF;
            color: white;
            font-weight: 700;
        }

        /* 3-panel grid */
        .grid3 {
            display: grid;
            grid-template-columns: 29fr 38fr 30fr;
            gap: 5px;
        }

        .panel {
            display: grid;
            gap: 4px;
        }

        .pL {
            grid-template-columns: repeat(3, 1fr);
        }

        .pM {
            grid-template-columns: repeat(4, 1fr);
        }

        .pR {
            grid-template-columns: repeat(3, 1fr);
        }

        /* QWERTY */
        .qwerty {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .qrow {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        /* Key */
        .key {
            position: relative;
            background: white;
            border-radius: 5px;
            min-height: 42px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 1px 0 rgba(0, 0, 0, .3);
            padding: 2px 3px;
            text-align: center;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .key:active,
        .key.pr {
            background: #b4b4b8;
        }

        .key.dk {
            background: #aeaeb2;
        }

        .key.dk:active,
        .key.dk.pr {
            background: #8e8e93;
        }

        .key.bl {
            background: #007AFF;
        }

        .key.bl:active,
        .key.bl.pr {
            background: #005ecb;
        }

        .kl {
            font-size: 15px;
            line-height: 1.2;
            color: #1c1c1e;
            pointer-events: none;
        }

        .key.bl .kl {
            color: white;
        }

        .kl sup {
            font-size: .65em;
            vertical-align: super;
        }

        .kl sub {
            font-size: .65em;
            vertical-align: sub;
        }

        .kl i {
            font-style: italic;
        }

        .kas {
            font-size: 9px;
            color: #6e6e73;
            margin-top: 1px;
            pointer-events: none;
            line-height: 1;
        }

        .key.bl .kas {
            color: rgba(255, 255, 255, .7);
        }

        .key.dk .kas {
            color: #5c5c60;
        }

        .kfrac {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .kfrac .fn {
            font-size: 10px;
            color: #1c1c1e;
            border-bottom: 1px solid #1c1c1e;
            padding: 0 4px;
            line-height: 1.5;
        }

        .kfrac .fd {
            font-size: 10px;
            color: #007AFF;
            padding: 0 4px;
            line-height: 1.5;
        }

        .vdot {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #007AFF;
            pointer-events: none;
        }

        /* Popup */
        #popup {
            position: fixed;
            z-index: 9999;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .22);
            display: none;
            flex-wrap: wrap;
            padding: 5px;
            gap: 4px;
            max-width: 92vw;
        }

        #popup.open {
            display: flex;
        }

        .pkey {
            min-width: 40px;
            height: 46px;
            background: #f2f2f7;
            border-radius: 7px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #1c1c1e;
            cursor: pointer;
            padding: 0 10px;
            white-space: nowrap;
            user-select: none;
            touch-action: none;
        }

        .pkey.hl {
            background: #007AFF;
            color: white;
        }
    </style>
</head>

<body>
    <div class="editor-wrap">
        <div id="math-input"></div>
        <div class="strip">
            <div class="latex-out" id="lo">ж•°ејҸгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>
            <button class="btn btn-c" id="btn-clear">ж¶ҲеҺ»</button>
            <button class="btn btn-p" id="btn-copy">гӮігғ”гғј</button>
        </div>
    </div>
    <div id="keyboard">
        <div class="util-bar">
            <button class="util-btn" id="btn-undo">вҶ©</button>
            <button class="util-btn" id="btn-redo">вҶӘ</button>
            <button class="util-btn" id="btn-del" style="color:#FF3B30">вҢ«</button>
        </div>
        <div class="tabs" id="tabs"></div>
        <div id="kbrows"></div>
    </div>
    <div id="popup"></div>

    <script>
        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           MathQuill setup
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        const MQ = MathQuill.getInterface(2);
        const mqField = MQ.MathField(document.getElementById('math-input'), {
            spaceBehavesLikeTab: true,
            handlers: { edit: updateLatex }
        });

        // гғ•гӮ©гғјгӮ«гӮ№з¶ӯжҢҒ: гӮӯгғјгғңгғјгғүгӮҜгғӘгғғгӮҜгҒ§гғ•гӮ©гғјгӮ«гӮ№гӮ’еҘӘгӮҸгҒӘгҒ„
        document.getElementById('keyboard').addEventListener('pointerdown', e => {
            e.preventDefault();
        });

        /* MathLive гҒ® #? / #@ / #0 / \placeholder гӮ’ MathQuill з”ЁгҒ«еӨүжҸӣ */
        function toMQ(ins) {
            return ins
                .replace(/\\placeholder/g, '')
                .replace(/#[@?0]/g, '');
        }

        function mqWrite(ins) {
            const latex = toMQ(ins);
            // ^ гӮ„ _ гҒҜ cmd() гҒ§е…ҘеҠӣгҒҷгӮӢгҒ»гҒҶгҒҢиҮӘз„¶
            if (latex === '^{}' || latex === '^') { mqField.cmd('^'); return; }
            if (latex === '_{}' || latex === '_') { mqField.cmd('_'); return; }
            mqField.write(latex);
        }

        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           KEY DATA
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        function oc(t) { return `\\operatorname{\\mathrm{${t}}}`; }

        function K(html, ins, opts = {}) {
            return { html, ins: ins ?? html, aside: opts.aside, vars: opts.vars ?? null, cls: opts.cls ?? '' };
        }
        function A(act, html, cls = '') {
            return { act, html, cls };
        }

        /* ж•°еӯ—гӮӯгғј: й•·жҠјгҒ—гҒ§гҖҢдёҠд»ҳгҒҚгҖҚгҖҢдёӢд»ҳгҒҚгҖҚгҖҢеҲҶж•°гҒ®еҲҶеӯҗгҖҚгғҗгғӘгӮўгғігғҲ */
        function D(n) {
            const DVARS = {
                0: [['\u2205', '\\varnothing'], ['\u221e', '\\infty']],
                1: [['1/\u25a1', '\\frac{1}{}'], ['\u25a1<sup>-1</sup>', '^{-1}'], ['\u00d710<sup>\u25a1</sup>', '\\times10^{}'], ['\u03c6', '\\phi'], ['<i>i</i>', 'i']],
                2: [['\u00bd', '\\frac{1}{2}'], ['\u25a1<sup>2</sup>', '^{2}'], ['\u221a2', '\\sqrt{2}'], ['\u212f', 'e']],
                3: [['\u2153', '\\frac{1}{3}'], ['\u25a1<sup>3</sup>', '^{3}'], ['\u221a3', '\\sqrt{3}'], ['\u03c0', '\\pi']],
                4: [['\u00bc', '\\frac{1}{4}'], ['\u25a1<sup>4</sup>', '^{4}']],
                5: [['1/5', '\\frac{1}{5}'], ['\u25a1<sup>5</sup>', '^{5}'], ['\u221a5', '\\sqrt{5}']],
                6: [['1/6', '\\frac{1}{6}'], ['\u25a1<sup>6</sup>', '^{6}']],
                7: [['1/7', '\\frac{1}{7}'], ['\u25a1<sup>7</sup>', '^{7}']],
                8: [['\u215b', '\\frac{1}{8}'], ['\u25a1<sup>8</sup>', '^{8}']],
                9: [['1/9', '\\frac{1}{9}'], ['\u25a1<sup>9</sup>', '^{9}']],
            };
            return K(String(n), String(n), { vars: DVARS[n] ?? [] });
        }

        /* в”Җв”Җ еҹәзӨҺ left в”Җв”Җ */
        const CM = K('cm', oc('cm'), { aside: 'й•·гҒ•', vars: [['mm', oc('mm')], ['cm', oc('cm')], ['m', oc('m')], ['km', oc('km')]] });
        const CM2 = K('cm<sup>2</sup>', oc('cm^2'), { aside: 'йқўз©Қ', vars: [['cmВІ', oc('cm^2')], ['mВІ', oc('m^2')], ['kmВІ', oc('km^2')], ['a', oc('a')], ['ha', oc('ha')]] });
        const CM3 = K('cm<sup>3</sup>', oc('cm^3'), { aside: 'дҪ“з©Қ', vars: [['cmВі', oc('cm^3')], ['mВі', oc('m^3')], ['kmВі', oc('km^3')]] });
        const PCT = K('%', '\\%', { aside: 'еүІеҗҲ', vars: [['%', '\\%'], [':', ':']] });
        const GK = K('g', oc('g'), { aside: 'йҮҚгҒ•', vars: [['mg', oc('mg')], ['g', oc('g')], ['kg', oc('kg')], ['t', oc('t')]] });
        const ML = K('mL', oc('mL'), { aside: 'е®№з©Қ', vars: [['mL', oc('mL')], ['dL', oc('dL')], ['L', oc('L')], ['kL', oc('kL')]] });
        const BANG = K('!');
        const QMRK = K('?');
        const DEG = K('В°', '^\\circ');
        const CIRC = K('в—Ӣ', '\\bigcirc');
        const TRIU = K('в–і', '\\triangle');
        const BXSQ = K('в–Ў', '\\square');

        /* в”Җв”Җ Numpad в”Җв”Җ */
        const DIV = K('Г·', '\\div', { vars: [['Г·', '\\div'], ['%', '\\%'], ['/', '/']] });
        const MLTX = K('Г—', '\\times', { vars: [['Г—', '\\times'], ['В·', '\\cdot'], ['*', '*']] });
        const MNUS = K('вҲ’', '-', { vars: [['Вұ', '\\pm'], ['вҲ“', '\\mp'], ['вҠ–', '\\ominus']] });
        const PLUS = K('+', '+', { vars: [['ОЈв–Ўв–Ў', '\\sum_{}^{}'], ['вҠ•', '\\oplus']] });
        const EQUL = K('=', '=', { vars: [['=', '='], ['вү ', '\\neq'], ['вү’', 'вү’'], ['вүҲ', '\\approx'], ['&gt;', '>'], ['&lt;', '<'], ['вүҘ', '\\ge'], ['вүӨ', '\\le'], ['вүЎ', '\\equiv'], ['вҲқ', '\\varpropto'], ['вүҲ', '\\thickapprox']] });
        const DOTK = K('.', '.', { vars: [['.', '.'], [',', ','], [';', ';'], ['вҲ¶', ':']] });

        /* в”Җв”Җ еҹәзӨҺ right в”Җв”Җ */
        const LARR = A('left', 'вҶҗ');
        const RARR = A('right', 'вҶ’');
        const BKSP = A('bksp', 'вҢ«', 'dk');
        const PARN = K('( )', '\\left(\\right)', { vars: [['[ ]', '\\left[\\right]'], ['{ }', '\\left\\{\\right\\}']] });
        const LT = K('&lt;', '<', { vars: [['вүҰ', '\\leq']] });
        const GT = K('&gt;', '>', { vars: [['вү§', '\\geq']] });
        const LEQQ = K('вүҰ', '\\leq');
        const GEQQ = K('вү§', '\\geq');
        const NEQ = K('вү ', '\\neq');
        const FDOT = K('вү’', 'вү’');
        const APPX = K('вүҲ', '\\approx');
        function FRAC() { return { special: 'frac', ins: '\\frac{}{}', aside: 'еҲҶж•°' }; }

        /* в”Җв”Җ зҷәеұ• left в”Җв”Җ */
        const SIN = K('sin', '\\sin', { aside: 'дёүи§’й–ўж•°', vars: [['sin', '\\sin'], ['cos', '\\cos'], ['tan', '\\tan'], ['Оё', '\\theta']] });
        const PIK = K('ПҖ', '\\pi', { aside: 'еҶҶ', vars: [['ПҖ', '\\pi'], ['Оё', '\\theta'], ['ПҶ', '\\phi'], ['вҢў', '\\overset{\\frown}{}']] });
        const SQRT = K('вҲҡ', '\\sqrt{}', { aside: 'е№іж–№ж №', vars: [['вҲҡв–Ў', '\\sqrt{}'], ['вҲӣв–Ў', '\\sqrt[3]{}'], ['вҲңв–Ў', '\\sqrt[4]{}']] });
        const INTK = K('вҲ«', '\\int_{}^{}', {
            aside: 'еҫ®з©Қ', vars: [
                ['dx', 'dx'],
                ['dy', 'dy'],
            ]
        });
        const LIM = K('lim', '\\lim', { aside: 'жҘөйҷҗ', vars: [['lim', '\\lim'], ['limвҶ’', '\\lim_{}'], ['вҲһ', '\\infty'], ['вҶ’', '\\to']] });
        const LOG = K('log', '\\log', { aside: 'еҜҫж•°', vars: [['log', '\\log'], ['ln', '\\ln'], ['log<sub>n</sub>', '\\log_{}'], ['e', 'e'], ['exp', '\\exp']] });
        const VEC = K('вҶ’', '\\to', { aside: 'гғҷгӮҜгғҲгғ«', vars: [['вҶ’', '\\to'], ['<i>a</i>вғ—', '\\vec{}'], ['|в–Ў|', '\\lvert{}\\rvert'], ['Г—', '\\times'], ['В·', '\\cdot'], ['вҮҢ', '\\rightleftharpoons'], ['вҮӢ', '\\leftrightharpoons']] });
        const SUM = K('ОЈ', '\\sum', { aside: 'ж•°еҲ—', vars: [['ОЈ', '\\sum'], ['О ', '\\prod'], ['вҲһ', '\\infty'], ['k', 'k'], ['n', 'n'], ['i', 'i']] });
        const MAT = K('вҠЎ', '\\begin{pmatrix} &  \\\\  & \\end{pmatrix}',
            {
                aside: 'иЎҢеҲ—', vars: [
                    ['2', '\\begin{pmatrix} &  \\\\  & \\end{pmatrix}'],
                    ['3', '\\begin{pmatrix} &  &  \\\\  &  &  \\\\  &  & \\end{pmatrix}'],
                    ['4', '\\begin{pmatrix} &  &  &  \\\\  &  &  &  \\\\  &  &  &  \\\\  &  &  & \\end{pmatrix}'],
                    ['5', '\\begin{pmatrix} &  &  &  &  \\\\  &  &  &  &  \\\\  &  &  &  &  \\\\  &  &  &  &  \\\\  &  &  &  & \\end{pmatrix}'],
                ]
            });
        const TRI = K('в–і', '\\triangle', { aside: 'еӣіеҪў', vars: [['в–і', '\\triangle'], ['вҲ ', '\\angle'], ['вҠҘ', '\\perp'], ['вҲҘ', '\\parallel'], ['вүЎ', '\\equiv'], ['вҲј', '\\sim']] });
        const SETK = K('вҲӘ', '\\cup', { aside: 'йӣҶеҗҲ', vars: [['вҲӘ', '\\cup'], ['вҲ©', '\\cap'], ['вҲҲ', '\\in'], ['вҠӮ', '\\subset'], ['вҲ…', '\\emptyset'], ['ДҒ', '\\overline{}']] });
        const IMGK = K('<i>i</i>', 'i', { aside: 'иӨҮзҙ ж•°', vars: [['i', 'i'], ['ДҒ', '\\bar{}'], ['И§', '\\dot{}']] });
        const SUPK = K('x<sup>в–Ў</sup>', '^{}', { aside: 'дёҠд»ҳгҒҚ' });
        const SUBK = K('x<sub>в–Ў</sub>', '_{}', { aside: 'дёӢд»ҳгҒҚ' });
        const XYZ = K('<i>x</i>', 'x', { aside: 'yz', vars: [['x', 'x'], ['y', 'y'], ['z', 'z']] });
        const ABCD = K('<i>a</i>', 'a', { aside: 'bcd', vars: [['a', 'a'], ['b', 'b'], ['c', 'c'], ['d', 'd']] });
        const NMFG = K('<i>n</i>', 'n', { aside: 'mfg', vars: [['n', 'n'], ['m', 'm'], ['f', 'f'], ['g', 'g']] });

        /* Row: [L0,L1,L2, null, M0,M1,M2,M3, null, R0,R1,R2] */
        function row(l0, l1, l2, m0, m1, m2, m3, r0, r1, r2) {
            return [l0, l1, l2, null, m0, m1, m2, m3, null, r0, r1, r2];
        }

        const BASIC_ROWS = [
            row(CM, CM2, CM3, D(7), D(8), D(9), DIV, LARR, RARR, BKSP),
            row(PCT, GK, ML, D(4), D(5), D(6), MLTX, PARN, LT, GT),
            row(BANG, QMRK, DEG, D(1), D(2), D(3), MNUS, FRAC(), LEQQ, GEQQ),
            row(CIRC, TRIU, BXSQ, D(0), DOTK, EQUL, PLUS, NEQ, FDOT, APPX),
        ];
        const ADV_ROWS = [
            row(SIN, PIK, SQRT, D(7), D(8), D(9), DIV, LARR, RARR, BKSP),
            row(INTK, LIM, LOG, D(4), D(5), D(6), MLTX, PARN, LT, GT),
            row(VEC, SUM, MAT, D(1), D(2), D(3), MNUS, FRAC(), SUPK, SUBK),
            row(TRI, SETK, IMGK, D(0), DOTK, EQUL, PLUS, XYZ, ABCD, NMFG),
        ];

        function abcDigit(n) { return K(String(n), String(n), { vars: [['<sup>' + n + '</sup>', '^{' + n + '}'], ['<sub>' + n + '</sub>', '_{' + n + '}']] }); }

        /* в”Җв”Җ abc гӮўгғ«гғ•гӮЎгғҷгғғгғҲй•·жҠјгҒ—гғҗгғӘгӮўгғігғҲ в”Җв”Җ */
        const ABC_VARS = {
            'a': [['Гў', 'Гў'], ['ГӨ', 'ГӨ'], ['ГҰ', 'ГҰ'], ['в„ө', '\\aleph'], ['вҲҖ', '\\forall'], ['ГҘ', 'ГҘ'], ['Г ', 'Г '], ['ГЎ', 'ГЎ']],
            'b': [['в„¶', '\\beth']],
            'c': [['в„Ӯ', '\\mathbb{C}'], ['Г§', 'Г§']],
            'd': [['в„ё', '\\daleth']],
            'e': [['ГӘ', 'ГӘ'], ['Г«', 'Г«'], ['в„Ҝ', 'e'], ['вҲғ', '\\exists'], ['вҲ„', '\\nexists'], ['ГЁ', 'ГЁ'], ['Г©', 'Г©']],
            'g': [['в„·', '\\gimel']],
            'h': [['в„Ҹ', '\\hbar'], ['в„Ҹ', '\\hslash']],
            'i': [['<i>i</i>', 'i'], ['Г¬', 'Г¬'], ['Гӯ', 'Гӯ'], ['Г®', 'Г®'], ['ГҜ', 'ГҜ']],
            'j': [['<i>j</i>', 'j']],
            'l': [['в„“', '\\ell']],
            'n': [['в„•', '\\mathbb{N}'], ['Гұ', 'Гұ']],
            'o': [['Г¶', 'Г¶'], ['Гё', 'Гё'], ['Е“', 'Е“'], ['ГІ', 'ГІ'], ['Гі', 'Гі'], ['Гҙ', 'Гҙ']],
            'p': [['в„ҷ', '\\mathbb{P}']],
            'q': [['в„ҡ', '\\mathbb{Q}']],
            'r': [['в„қ', '\\mathbb{R}']],
            'u': [['Г№', 'Г№'], ['Гә', 'Гә'], ['Г»', 'Г»'], ['Гј', 'Гј']],
            'v': [['вҲЁ', '\\vee'], ['вӢҒ', '\\bigvee']],
            'x': [['Г—', '\\times']],
            'y': [['ГҪ', 'ГҪ'], ['Гҝ', 'Гҝ']],
            'z': [['в„Ө', '\\mathbb{Z}']],
        };

        function abcKey(c) {
            const lower = c.toLowerCase();
            const vars = ABC_VARS[lower] ?? null;
            return K(c, c, vars ? { vars } : {});
        }

        function abcRows(sh) {
            return [
                [1, 2, 3, 4, 5, 6, 7, 8, 9, 0].map(abcDigit),
                (sh ? 'QWERTYUIOP' : 'qwertyuiop').split('').map(abcKey),
                (sh ? 'ASDFGHJKL' : 'asdfghjkl').split('').map(abcKey),
                [A('shift', 'вҮ§', 'dk'), ...(sh ? 'ZXCVBNM' : 'zxcvbnm').split('').map(abcKey), A('bksp', 'вҢ«', 'dk')],
                sh ? [K('Вұ', '\\pm'), K('ОЈ', '\\sum'), K('вү ', '\\neq'), K(';'), K(','), A('left', 'вҶҗ', 'dk'), A('right', 'вҶ’', 'dk'), A('enter', 'вҶө', 'dk')]
                    : [MNUS, PLUS, K('='), K(','), DOTK, A('left', 'вҶҗ', 'dk'), A('right', 'вҶ’', 'dk'), A('enter', 'вҶө', 'dk')],
            ];
        }

        function greekRows(sh) {
            const bot = [
                K('Оө', '\\varepsilon', { aside: 'epsilon var.' }), K('П‘', '\\vartheta', { aside: 'theta var.' }),
                K('П°', '\\varkappa', { aside: 'kappa var.' }), K('П–', '\\varpi', { aside: 'pi var.' }),
                K('Пұ', '\\varrho', { aside: 'rho var.' }),
                A('left', 'вҶҗ', 'dk'), A('right', 'вҶ’', 'dk'), A('enter', 'вҶө', 'dk'),
            ];
            if (!sh) return [
                [K('ПҶ', '\\varphi', { aside: 'phi var.' }), K('ПӮ', '\\varsigma', { aside: 'sigma var.' }), K('Оө', '\\varepsilon', { aside: 'epsilon' }), K('ПҒ', '\\rho', { aside: 'rho' }), K('П„', '\\tau', { aside: 'tau' }), K('П…', '\\upsilon', { aside: 'upsilon' }), K('Оё', '\\theta', { aside: 'theta' }), K('О№', '\\iota', { aside: 'iota' }), K('o', 'o', { aside: 'omicron' }), K('ПҖ', '\\pi', { aside: 'pi' })],
                [K('Оұ', '\\alpha', { aside: 'alpha' }), K('Пғ', '\\sigma', { aside: 'sigma' }), K('Оҙ', '\\delta', { aside: 'delta' }), K('ПҶ', '\\phi', { aside: 'phi' }), K('Оі', '\\gamma', { aside: 'gamma' }), K('О·', '\\eta', { aside: 'eta' }), K('Оҫ', '\\xi', { aside: 'xi' }), K('Оә', '\\kappa', { aside: 'kappa' }), K('О»', '\\lambda', { aside: 'lambda' })],
                [A('shift', 'вҮ§', 'dk'), K('О¶', '\\zeta', { aside: 'zeta' }), K('ПҮ', '\\chi', { aside: 'chi' }), K('ПҲ', '\\psi', { aside: 'psi' }), K('Пү', '\\omega', { aside: 'omega' }), K('ОІ', '\\beta', { aside: 'beta' }), K('ОҪ', '\\nu', { aside: 'nu' }), K('Ој', '\\mu', { aside: 'mu' }), A('bksp', 'вҢ«', 'dk')],
                bot,
            ];
            // LoiloNote гҒ®еӨ§ж–Үеӯ—: \char"XXXX еҪўејҸгҒ§е®ҹйҡӣгҒ®Greek UnicodeгӮ’жҢҝе…Ҙ
            // иЎЁзӨәгӮӯгғјгҒҜ Unicode гӮ®гғӘгӮ·гғЈж–Үеӯ—гҖҒinsert гҒҜ LoiloNote жә–жӢ гҒ® LaTeX
            return [
                // ОҰ  ОЈ  О•(0190)     ОЎ(03A1)        ОӨ(03A4)        ОҘ          Оҳ          Оҷ(0399)        Оҹ(039F)        О 
                [K('ОҰ', '\\Phi'), K('ОЈ', '\\Sigma'), K('Жҗ', '\\char"0190'), K('ОЎ', '\\char"03A1'), K('ОӨ', '\\char"03A4'), K('ОҘ', '\\Upsilon'), K('Оҳ', '\\Theta'), K('Оҷ', '\\char"0399'), K('Оҹ', '\\char"039F'), K('О ', '\\Pi')],
                // О‘(0391)        ОЈ          О”          ОҰ          О“          О—(0397)        Оһ          Оҡ(039A)         Оӣ
                [K('О‘', '\\char"0391'), K('ОЈ', '\\Sigma'), K('О”', '\\Delta'), K('ОҰ', '\\Phi'), K('О“', '\\Gamma'), K('О—', '\\char"0397'), K('Оһ', '\\Xi'), K('Оҡ', '\\char"039A'), K('Оӣ', '\\Lambda')],
                // shift  О–(0396)        О§(03A7)        ОЁ          О©          О’(0392)        Оқ(039D)        Оң(039C)        bksp
                [A('shift', 'вҮ§', 'dk'), K('О–', '\\char"0396'), K('О§', '\\char"03A7'), K('ОЁ', '\\Psi'), K('О©', '\\Omega'), K('О’', '\\char"0392'), K('Оқ', '\\char"039D'), K('Оң', '\\char"039C'), A('bksp', 'вҢ«', 'dk')],
                bot,
            ];
        }

        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           STATE
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        let tab = 0, shift = false, lpOpen = false;
        const TABS = ['еҹәзӨҺ', 'зҷәеұ•', 'abc', 'ОұОІОі'];

        /* зү©зҗҶ Shift гӮӯгғјеҗҢжңҹ */
        document.addEventListener('keydown', e => { if (e.key === 'Shift' && !shift) { shift = true; render(); } });
        document.addEventListener('keyup', e => { if (e.key === 'Shift' && shift) { shift = false; render(); } });

        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           RENDER
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        function render() {
            const tabsEl = document.getElementById('tabs');
            tabsEl.innerHTML = '';
            TABS.forEach((t, i) => {
                const d = mk('div', 'tab' + (i === tab ? ' on' : ''));
                d.textContent = t;
                d.addEventListener('click', () => { tab = i; shift = false; render(); });
                tabsEl.appendChild(d);
            });
            const el = document.getElementById('kbrows');
            el.innerHTML = '';
            if (tab === 0) el.appendChild(makeGrid(BASIC_ROWS));
            else if (tab === 1) el.appendChild(makeGrid(ADV_ROWS));
            else if (tab === 2) el.appendChild(makeQwerty(abcRows(shift)));
            else el.appendChild(makeQwerty(greekRows(shift)));
        }

        function makeGrid(rows) {
            const w = mk('div', 'grid3');
            const L = mk('div', 'panel pL'), M = mk('div', 'panel pM'), R = mk('div', 'panel pR');
            rows.forEach(r => {
                [r[0], r[1], r[2]].forEach(k => L.appendChild(makeKey(k)));
                [r[4], r[5], r[6], r[7]].forEach(k => M.appendChild(makeKey(k)));
                [r[9], r[10], r[11]].forEach(k => R.appendChild(makeKey(k)));
            });
            w.appendChild(L); w.appendChild(M); w.appendChild(R);
            return w;
        }

        function makeQwerty(rows) {
            const w = mk('div', 'qwerty');
            rows.forEach(row => {
                const r = mk('div', 'qrow');
                row.forEach(k => {
                    const ke = makeKey(k);
                    ke.style.flex = '1 1 0'; ke.style.minWidth = '0'; ke.style.maxWidth = '64px';
                    if (k.act === 'shift' || k.act === 'bksp') ke.style.flex = '1.7 1 0';
                    r.appendChild(ke);
                });
                w.appendChild(r);
            });
            return w;
        }

        function makeKey(kd) {
            const e = mk('div', 'key');
            if (kd.cls) kd.cls.split(' ').forEach(c => { if (c) e.classList.add(c); });
            if (kd.act === 'shift' && shift) { e.classList.remove('dk'); e.classList.add('bl'); }
            const lbl = mk('div', 'kl');
            if (kd.special === 'frac') {
                const f = mk('div', 'kfrac');
                f.innerHTML = '<div class="fn">в–Ў</div><div class="fd">в–Ў</div>';
                lbl.appendChild(f);
            } else {
                lbl.innerHTML = kd.html;
            }
            e.appendChild(lbl);
            if (kd.aside) { const a = mk('div', 'kas'); a.textContent = kd.aside; e.appendChild(a); }
            if (kd.vars && kd.vars.length) e.appendChild(mk('span', 'vdot'));
            bind(e, kd);
            return e;
        }

        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           KEY EVENTS
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        function bind(e, kd) {
            let timer = null, fired = false;
            e.addEventListener('pointerdown', ev => {
                ev.preventDefault(); fired = false; e.classList.add('pr');
                if (kd.vars && kd.vars.length) {
                    timer = setTimeout(() => { fired = true; e.classList.remove('pr'); openPopup(e, kd.vars); }, 380);
                }
            });
            e.addEventListener('pointerup', ev => {
                ev.preventDefault(); clearTimeout(timer); e.classList.remove('pr');
                if (!fired) doKey(kd);
            });
            e.addEventListener('pointerleave', () => { clearTimeout(timer); e.classList.remove('pr'); });
            e.addEventListener('pointercancel', () => { clearTimeout(timer); e.classList.remove('pr'); });
        }

        /* LaTeX command гҒӢ Unicodeж–Үеӯ—гҒӢгӮ’еҲӨе®ҡгҒ—гҒҰйҒ©еҲҮгҒ«жҢҝе…Ҙ */
        function mqInsert(raw) {
            const ins = toMQ(raw);
            if (ins === '^{}' || ins === '^') { mqField.cmd('^'); return; }
            if (ins === '_{}' || ins === '_') { mqField.cmd('_'); return; }
            // ^{content} вҶ’ cmd('^') + typedText гҒ§жӢ¬еј§гҒӘгҒ—гҒ«е…ҘеҠӣ
            const supMatch = ins.match(/^\^\{([^}]+)\}$/);
            if (supMatch) { mqField.cmd('^');[...supMatch[1]].forEach(ch => mqField.typedText(ch)); mqField.keystroke('Right'); return; }
            // _{content} вҶ’ cmd('_') + typedText
            const subMatch = ins.match(/^_\{([^}]+)\}$/);
            if (subMatch) { mqField.cmd('_');[...subMatch[1]].forEach(ch => mqField.typedText(ch)); mqField.keystroke('Right'); return; }
            // \\char"XXXX вҶ’ е®ҹйҡӣгҒ®Unicodeж–Үеӯ—гҒ«еӨүжҸӣгҒ—гҒҰ typedText гҒ§жҢҝе…Ҙ
            const charMatch = ins.match(/^\\char"([0-9A-Fa-f]{4})$/);
            if (charMatch) {
                const ch = String.fromCodePoint(parseInt(charMatch[1], 16));
                mqField.typedText(ch);
                return;
            }
            // гғҗгғғгӮҜгӮ№гғ©гғғгӮ·гғҘгҒӘгҒ— & зҹӯгҒ„ж–Үеӯ—еҲ— вҶ’ typedText гҒ§1ж–Үеӯ—гҒҡгҒӨ
            if (!ins.startsWith('\\') && ins.length <= 4) {
                [...ins].forEach(ch => mqField.typedText(ch));
                return;
            }
            // иЎҢеҲ—гҒӘгҒ© \begin{} з’°еўғ: write() гҒҢз©әгӮ»гғ«гӮ’жүұгҒҲгҒӘгҒ„е ҙеҗҲгҒ« latex() гҒ§гғ•гӮ©гғјгғ«гғҗгғғгӮҜ
            if (ins.startsWith('\\begin{')) {
                const before = mqField.latex();
                mqField.write(ins);
                if (mqField.latex() === before) mqField.latex(before + ins);
                return;
            }
            mqField.write(ins);
        }

        function doKey(kd) {
            if (kd.act) {
                switch (kd.act) {
                    case 'left': mqField.keystroke('Left'); break;
                    case 'right': mqField.keystroke('Right'); break;
                    case 'bksp': mqField.keystroke('Backspace'); break;
                    case 'enter': mqField.keystroke('Tab'); break;
                    case 'shift': shift = !shift; render(); return;
                }
                mqField.focus();
            } else {
                mqInsert(kd.ins ?? kd.html);
                mqField.focus();
            }
            updateLatex();
        }

        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           POPUP
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        function openPopup(srcEl, vars) {
            const pop = document.getElementById('popup');
            pop.innerHTML = ''; lpOpen = true;
            vars.forEach(([html, ins]) => {
                const b = mk('div', 'pkey');
                b.innerHTML = html;
                b.addEventListener('pointerdown', ev => { ev.preventDefault(); ev.stopPropagation(); b.classList.add('hl'); });
                b.addEventListener('pointerup', ev => {
                    ev.preventDefault(); ev.stopPropagation();
                    mqInsert(ins); mqField.focus();
                    updateLatex(); closePopup();
                });
                b.addEventListener('pointerenter', () => {
                    pop.querySelectorAll('.pkey').forEach(x => x.classList.remove('hl')); b.classList.add('hl');
                });
                pop.appendChild(b);
            });
            pop.classList.add('open');
            requestAnimationFrame(() => {
                const r = srcEl.getBoundingClientRect();
                let left = r.left + r.width / 2 - pop.offsetWidth / 2;
                left = Math.max(6, Math.min(left, innerWidth - pop.offsetWidth - 6));
                pop.style.left = left + 'px';
                pop.style.top = Math.max(6, r.top - pop.offsetHeight - 6) + 'px';
            });
        }
        function closePopup() { document.getElementById('popup').classList.remove('open'); lpOpen = false; }
        document.addEventListener('pointerdown', e => {
            if (lpOpen && !document.getElementById('popup').contains(e.target)) closePopup();
        });

        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           ACTIONS
           в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        function updateLatex() {
            document.getElementById('lo').textContent = mqField.latex() || 'ж•°ејҸгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';
        }
        document.getElementById('btn-undo').addEventListener('click', () => { mqField.keystroke('Ctrl-Z'); updateLatex(); });
        document.getElementById('btn-redo').addEventListener('click', () => { mqField.keystroke('Ctrl-Shift-Z'); updateLatex(); });
        document.getElementById('btn-del').addEventListener('click', () => { mqField.keystroke('Backspace'); updateLatex(); });
        document.getElementById('btn-clear').addEventListener('click', () => { mqField.latex(''); updateLatex(); });
        document.getElementById('btn-copy').addEventListener('click', () => {
            navigator.clipboard.writeText(mqField.latex()).then(() => {
                const b = document.getElementById('btn-copy');
                b.textContent = 'вң“ гӮігғ”гғјжёҲгҒҝ';
                setTimeout(() => b.textContent = 'гӮігғ”гғј', 1800);
            });
        });

        function toMQ(ins) {
            return ins.replace(/\\placeholder/g, '').replace(/#[@?0]/g, '');
        }
        function mk(tag, cls = '') { const e = document.createElement(tag); if (cls) e.className = cls; return e; }

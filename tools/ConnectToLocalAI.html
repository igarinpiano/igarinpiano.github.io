<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>Local AI Chat</title>
    <!--
        Tailwind Play CDN について:
        コンソールに "should not be used in production" と出ますが、
        機能上の問題はありません。単一 HTML ファイルとして配布・利用する場合は無視で構いません。
        本格的に最適化したい場合は Tailwind CLI でビルドし、生成した CSS を
        <link rel="stylesheet"> で読み込む形に変えてください。
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="window._katexReady=true;"></script>

    <style>
        /* ── Accent Color ─────────────────────────────────── */
        :root {
            --accent: #3b82f6;
            --accent-fg: #ffffff;
        }

        .a-text {
            color: var(--accent) !important;
        }

        .a-bg {
            background-color: var(--accent) !important;
        }

        input[type="range"] {
            accent-color: var(--accent);
        }

        input:checked+.slider {
            background-color: var(--accent) !important;
        }

        /* ── Settings Panel ───────────────────────────────── */
        .settings-panel {
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }

        .settings-panel.open {
            transform: translateY(0);
        }

        /* ── Toggle Switch ────────────────────────────────── */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #e5e7eb;
            transition: .3s;
            border-radius: 34px;
        }

        .slider::before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: .3s;
            border-radius: 50%;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .25);
        }

        input:checked+.slider::before {
            transform: translateX(22px);
        }

        @media (prefers-color-scheme:dark) {
            .slider {
                background-color: #636366;
            }
        }

        /* ── Color Swatches ───────────────────────────────── */
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color .15s, transform .15s;
            outline: none;
            flex-shrink: 0;
        }

        .color-swatch.active {
            border-color: #8e8e93;
            transform: scale(1.2);
        }

        /* ── Reasoning Block ──────────────────────────────── */
        .reasoning-block {
            border-left: 2px solid var(--accent);
            opacity: .85;
        }

        .reasoning-block summary {
            cursor: pointer;
            list-style: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .reasoning-block summary::-webkit-details-marker {
            display: none;
        }

        .reasoning-arrow {
            transition: transform .2s ease;
            display: inline-block;
        }

        .reasoning-block[open] .reasoning-arrow {
            transform: rotate(90deg);
        }

        /* ── Prose / Markdown ─────────────────────────────── */
        .prose {
            line-height: 1.72;
        }

        .prose p {
            margin-bottom: .65em;
        }

        .prose ul,
        .prose ol {
            padding-left: 1.5rem;
            margin-bottom: .65em;
        }

        .prose li {
            margin-bottom: .25em;
        }

        .prose h1,
        .prose h2,
        .prose h3,
        .prose h4 {
            font-weight: 700;
            margin: 1em 0 .35em;
            line-height: 1.3;
        }

        .prose h1 {
            font-size: 1.35em;
        }

        .prose h2 {
            font-size: 1.2em;
        }

        .prose h3 {
            font-size: 1.05em;
        }

        .prose pre {
            background: #f8fafc;
            padding: .85rem;
            border-radius: .6rem;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            margin: .6em 0;
            font-size: .875em;
        }

        .prose code {
            font-family: ui-monospace, SFMono-Regular, 'Courier New', monospace;
            background: #f1f5f9;
            color: #1e293b;
            padding: .18em .42em;
            border-radius: .3rem;
            font-size: .875em;
        }

        .prose pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: 1em;
        }

        .prose blockquote {
            border-left: 3px solid #cbd5e1;
            padding-left: .85rem;
            color: #64748b;
            margin: .6em 0;
            font-style: italic;
        }

        .prose a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .prose table {
            border-collapse: collapse;
            width: 100%;
            margin: .6em 0;
            font-size: .9em;
        }

        .prose th,
        .prose td {
            border: 1px solid #e2e8f0;
            padding: .4rem .7rem;
            text-align: left;
        }

        .prose th {
            background: #f8fafc;
            font-weight: 600;
        }

        .prose hr {
            border-color: #e2e8f0;
            margin: 1em 0;
        }

        .prose strong {
            font-weight: 600;
        }

        /* KaTeX display math block */
        .prose .katex-display {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: .5rem;
            padding: .75rem 1rem;
            overflow-x: auto;
            margin: .75em 0;
        }

        @media (prefers-color-scheme:dark) {
            .prose pre {
                background: #1a1a1e;
                border-color: #2d2d30;
            }

            .prose code {
                background: #1a1a1e;
                color: #e2e8f0;
            }

            .prose blockquote {
                border-color: #48484a;
                color: #98989d;
            }

            .prose th {
                background: #1a1a1e;
            }

            .prose th,
            .prose td {
                border-color: #2d2d30;
            }

            .prose hr {
                border-color: #2d2d30;
            }

            .prose .katex-display {
                background: #1a1a1e;
                border-color: #2d2d30;
            }
        }

        /* ── Select right-align ───────────────────────────── */
        select.sel-right {
            text-align-last: right;
            direction: rtl;
        }

        select.sel-right option {
            direction: ltr;
        }

        /* ── Hide native number spinners ──────────────────── */
        input[type=number].no-spin::-webkit-inner-spin-button,
        input[type=number].no-spin::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number].no-spin {
            -moz-appearance: textfield;
        }

        /* ── Scrollbars ───────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        @media (prefers-color-scheme:dark) {
            ::-webkit-scrollbar-thumb {
                background: #48484a;
            }
        }

        /* ── Thinking Dots ────────────────────────────────── */
        @keyframes thinking {

            0%,
            100% {
                opacity: .2
            }

            50% {
                opacity: 1
            }
        }

        .thinking-dot {
            animation: thinking 1.4s ease-in-out infinite;
            display: inline-block;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: .22s;
        }

        .thinking-dot:nth-child(3) {
            animation-delay: .44s;
        }

        /* ── Message Fade-in ──────────────────────────────── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-ai {
            animation: fadeIn .25s ease-out;
        }

        /* ── iOS Safe Area ────────────────────────────────── */
        .footer-safe {
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
        }

        /* ── Settings Row ─────────────────────────────────── */
        .settings-row {
            display: flex;
            align-items: center;
            padding: .85rem 1rem;
        }

        .srow-label {
            flex-shrink: 0;
            width: 6.5rem;
            font-size: .875rem;
            font-weight: 500;
            color: #374151;
        }

        @media (prefers-color-scheme:dark) {
            .srow-label {
                color: #d1d5db;
            }
        }

        /* ── Thinking Button ──────────────────────────────── */
        #thinkingBtn {
            transition: background-color .2s, color .2s, border-color .2s;
        }

        #thinkingBtn.thinking-on {
            background-color: var(--accent) !important;
            color: var(--accent-fg) !important;
            border-color: var(--accent) !important;
        }

        /* ── Fetch button fixed width ─────────────────────── */
        #fetchBtnHeader {
            min-width: 4.5rem;
            text-align: center;
        }

        /* ── Full viewport height ─────────────────────────── */
        body {
            height: 100dvh;
        }

        @supports not (height:100dvh) {
            body {
                height: 100vh;
            }
        }
    </style>
</head>

<body class="bg-white dark:bg-black text-gray-900 dark:text-white flex flex-col overflow-hidden transition-colors">

    <!-- ── Header ───────────────────────────────────────────────────────────────── -->
    <header
        class="bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-gray-200 dark:border-[#2c2c2e] px-4 py-3 sticky top-0 z-10 shrink-0">
        <div class="max-w-3xl mx-auto flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <h1 class="font-bold text-lg tracking-tight select-none">AI Chat</h1>
                <button id="openSettings"
                    class="a-text font-semibold text-sm px-2 py-1 rounded-lg active:opacity-60 transition-opacity">設定</button>
            </div>
            <div class="flex gap-2 items-center">
                <select id="modelSelect"
                    class="flex-1 min-w-0 bg-gray-100 dark:bg-[#1c1c1e] border border-gray-200 dark:border-[#3a3a3c] rounded-xl px-3 py-2 text-sm outline-none text-gray-900 dark:text-white cursor-pointer truncate">
                    <option value="">— モデルを取得してください —</option>
                </select>
                <button id="fetchBtnHeader"
                    class="shrink-0 text-[10px] font-bold uppercase tracking-widest bg-gray-200 dark:bg-[#2c2c2e] text-gray-600 dark:text-gray-300 px-3 py-2 rounded-xl active:opacity-60 transition-opacity disabled:opacity-40">
                    Fetch
                </button>
            </div>
        </div>
    </header>

    <!-- ── Chat Window ───────────────────────────────────────────────────────────── -->
    <main id="chatWindow" class="flex-1 overflow-y-auto bg-white dark:bg-black overscroll-contain">
        <div id="scrollContainer" class="max-w-[72rem] mx-auto px-4 py-6 md:px-8 md:py-10 space-y-5">
            <div id="welcome" class="text-center py-20 select-none">
                <h2 class="text-xl font-bold text-gray-300 dark:text-gray-600 mb-2">Local AI Chat</h2>
                <p class="text-sm text-gray-400 dark:text-gray-500">設定からサーバーを設定し、<br>会話を開始してください。</p>
            </div>
        </div>
    </main>

    <!-- ── Input Area ────────────────────────────────────────────────────────────── -->
    <footer
        class="bg-white dark:bg-black border-t border-gray-200 dark:border-[#2c2c2e] px-3 pt-3 footer-safe shrink-0 transition-colors">
        <div class="max-w-3xl mx-auto flex items-end gap-2">
            <textarea id="userInput" rows="1" placeholder="メッセージ"
                class="flex-1 bg-gray-100 dark:bg-[#1c1c1e] border-none rounded-2xl px-4 py-3 focus:outline-none resize-none max-h-40 min-h-[48px] text-base text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-colors leading-normal"></textarea>

            <!-- Thinking toggle -->
            <button id="thinkingBtn" title="思考プロセスを有効化 (Anthropic: extended thinking)"
                class="shrink-0 rounded-full p-3 border border-gray-200 dark:border-[#3a3a3c] text-gray-400 dark:text-gray-500 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path
                        d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
                </svg>
            </button>

            <!-- Send -->
            <button id="sendBtn"
                class="a-bg shrink-0 rounded-full p-3 shadow-sm disabled:opacity-30 active:scale-95 transition-all"
                style="color:var(--accent-fg)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path
                        d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </footer>

    <!-- ── Settings Overlay ──────────────────────────────────────────────────────── -->
    <div id="settingsOverlay" class="fixed inset-0 bg-black/40 z-20 hidden"></div>

    <!-- ── Settings Panel ───────────────────────────────────────────────────────── -->
    <div id="settingsPanel"
        class="fixed inset-x-0 bottom-0 bg-[#f2f2f7] dark:bg-[#111111] rounded-t-2xl z-30 max-h-[92dvh] overflow-y-auto settings-panel shadow-2xl border-t border-gray-100 dark:border-[#2c2c2e]">

        <div
            class="sticky top-0 bg-[#f2f2f7]/95 dark:bg-[#111111]/95 backdrop-blur-sm px-4 py-4 border-b border-gray-200 dark:border-[#2c2c2e] flex justify-between items-center z-10">
            <h2 class="font-bold text-lg dark:text-white">設定</h2>
            <button id="closeSettingsBtn" class="a-text font-bold text-sm px-2 py-1">完了</button>
        </div>

        <div class="p-4 space-y-5 pb-16">

            <!-- 接続設定 -->
            <section class="space-y-2">
                <h3 class="px-1 text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">
                    接続設定</h3>
                <div
                    class="bg-white dark:bg-[#1c1c1e] rounded-2xl overflow-hidden border border-gray-200 dark:border-[#3a3a3c] divide-y divide-gray-100 dark:divide-[#2c2c2e]">

                    <!-- API Type -->
                    <div class="settings-row">
                        <span class="srow-label">API タイプ</span>
                        <select id="apiType"
                            class="ml-auto bg-transparent a-text text-sm font-semibold outline-none cursor-pointer sel-right">
                            <option value="openai">OpenAI 互換</option>
                            <option value="lmstudio">LM Studio</option>
                            <option value="anthropic">Anthropic</option>
                        </select>
                    </div>

                    <!-- URL -->
                    <div class="settings-row">
                        <span class="srow-label">URL</span>
                        <input id="serverUrl" type="url" inputmode="url" placeholder="http://192.168.x.x"
                            autocomplete="off" spellcheck="false"
                            class="flex-1 min-w-0 bg-transparent outline-none text-sm a-text placeholder-gray-300 dark:placeholder-gray-600 text-right">
                    </div>

                    <!-- Port -->
                    <div class="settings-row">
                        <span class="srow-label">ポート</span>
                        <div class="flex items-center gap-1.5 ml-auto">
                            <button id="portMinus"
                                class="w-7 h-7 rounded-lg bg-gray-100 dark:bg-[#2c2c2e] text-gray-800 dark:text-gray-100 font-bold text-base active:opacity-60 flex items-center justify-center select-none leading-none">−</button>
                            <input id="serverPort" type="number" inputmode="numeric" placeholder="1234" min="1"
                                max="65535"
                                class="no-spin w-20 bg-transparent outline-none text-sm a-text placeholder-gray-300 dark:placeholder-gray-600 text-center">
                            <button id="portPlus"
                                class="w-7 h-7 rounded-lg bg-gray-100 dark:bg-[#2c2c2e] text-gray-800 dark:text-gray-100 font-bold text-base active:opacity-60 flex items-center justify-center select-none leading-none">＋</button>
                        </div>
                    </div>

                    <!-- API Key -->
                    <div>
                        <div class="settings-row">
                            <span class="srow-label">API キー</span>
                            <div class="flex-1 flex items-center justify-end">
                                <label class="toggle-switch">
                                    <input id="useApiKey" type="checkbox">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                        <div id="apiKeyRow" class="hidden px-4 pb-3.5">
                            <input id="apiKeyInput" type="password" placeholder="APIキーを入力（タブを閉じるまで保持）"
                                autocomplete="off" spellcheck="false"
                                class="w-full bg-gray-100 dark:bg-[#2c2c2e] rounded-xl px-3 py-2.5 text-sm outline-none a-text placeholder-gray-400 dark:placeholder-gray-500">
                        </div>
                    </div>
                </div>
            </section>

            <!-- パラメータ -->
            <section class="space-y-2">
                <h3 class="px-1 text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">
                    パラメータ</h3>
                <div
                    class="bg-white dark:bg-[#1c1c1e] rounded-2xl border border-gray-200 dark:border-[#3a3a3c] p-4 space-y-4">

                    <div class="flex justify-between items-center gap-4">
                        <span class="text-sm dark:text-gray-300 shrink-0">Temperature</span>
                        <div class="flex items-center gap-2 flex-1 justify-end">
                            <input id="temperature" type="range" min="0" max="2" step="0.1" value="0.7"
                                class="w-28 sm:w-36">
                            <span id="tempVal" class="a-text font-mono text-sm w-8 text-right tabular-nums">0.7</span>
                        </div>
                    </div>

                    <hr class="border-gray-100 dark:border-[#2c2c2e]">

                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium dark:text-gray-300">ストリーミング</span>
                        <label class="toggle-switch">
                            <input id="useStream" type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <hr class="border-gray-100 dark:border-[#2c2c2e]">

                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium dark:text-gray-300">表示モード</span>
                        <select id="displayMode"
                            class="bg-transparent text-sm a-text font-semibold outline-none cursor-pointer sel-right">
                            <option value="markdown">Markdown</option>
                            <option value="plain">Plain Text</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- アクセントカラー -->
            <section class="space-y-2">
                <h3 class="px-1 text-[10px] font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">
                    アクセントカラー</h3>
                <div class="bg-white dark:bg-[#1c1c1e] rounded-2xl border border-gray-200 dark:border-[#3a3a3c] p-4">
                    <div class="flex items-center justify-around">
                        <!-- Neutral: leftmost; background set by JS -->
                        <button class="color-swatch" id="neutralSwatch" data-accent="neutral" aria-label="ニュートラル"
                            title="ニュートラル"></button>
                        <button class="color-swatch" data-accent="blue" style="background:#3b82f6" aria-label="ブルー"
                            title="ブルー"></button>
                        <button class="color-swatch" data-accent="pink" style="background:#ec4899" aria-label="ピンク"
                            title="ピンク"></button>
                        <button class="color-swatch" data-accent="green" style="background:#22c55e" aria-label="グリーン"
                            title="グリーン"></button>
                        <button class="color-swatch" data-accent="yellow" style="background:#f59e0b" aria-label="イエロー"
                            title="イエロー"></button>
                    </div>
                </div>
            </section>

            <!-- チャット履歴を消去 -->
            <button id="clearBtn"
                class="w-full bg-white dark:bg-[#1c1c1e] text-red-500 dark:text-red-400 py-3.5 rounded-2xl font-semibold border border-red-100 dark:border-[#3a3a3c] active:bg-red-50 dark:active:bg-[#2c2c2e] transition-colors shadow-sm">
                チャット履歴を消去
            </button>
        </div>
    </div>

    <!-- ── Toast ─────────────────────────────────────────────────────────────────── -->
    <div id="toastContainer"
        class="fixed bottom-28 left-0 right-0 flex flex-col items-center gap-2 z-50 pointer-events-none px-4"></div>

    <script>
        (() => {
            'use strict';

            // ── Constants ───────────────────────────────────────────────────────────────
            const ACCENT_MAP = {
                blue: { color: '#3b82f6', fg: '#ffffff' },
                pink: { color: '#ec4899', fg: '#ffffff' },
                green: { color: '#22c55e', fg: '#ffffff' },
                yellow: { color: '#f59e0b', fg: '#ffffff' },
                neutral: null,
            };
            const MATH_OPTIONS = {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                    { left: '\\[', right: '\\]', display: true },
                    { left: '\\(', right: '\\)', display: false },
                ],
                throwOnError: false,
            };

            // ── DOM Refs ─────────────────────────────────────────────────────────────────
            const el = {
                chatWindow: document.getElementById('chatWindow'),
                scrollContainer: document.getElementById('scrollContainer'),
                userInput: document.getElementById('userInput'),
                sendBtn: document.getElementById('sendBtn'),
                thinkingBtn: document.getElementById('thinkingBtn'),
                openSettings: document.getElementById('openSettings'),
                closeSettingsBtn: document.getElementById('closeSettingsBtn'),
                settingsPanel: document.getElementById('settingsPanel'),
                settingsOverlay: document.getElementById('settingsOverlay'),
                apiType: document.getElementById('apiType'),
                serverUrl: document.getElementById('serverUrl'),
                serverPort: document.getElementById('serverPort'),
                portMinus: document.getElementById('portMinus'),
                portPlus: document.getElementById('portPlus'),
                useApiKey: document.getElementById('useApiKey'),
                apiKeyInput: document.getElementById('apiKeyInput'),
                apiKeyRow: document.getElementById('apiKeyRow'),
                modelSelect: document.getElementById('modelSelect'),
                fetchBtnHeader: document.getElementById('fetchBtnHeader'),
                temperature: document.getElementById('temperature'),
                tempVal: document.getElementById('tempVal'),
                useStream: document.getElementById('useStream'),
                displayMode: document.getElementById('displayMode'),
                clearBtn: document.getElementById('clearBtn'),
                neutralSwatch: document.getElementById('neutralSwatch'),
                toastContainer: document.getElementById('toastContainer'),
            };

            // ── State ────────────────────────────────────────────────────────────────────
            let chatHistory = [];
            let isAutoScrolling = true;
            let isSending = false;
            let abortCtrl = null;
            let useThinking = false;

            marked.use({ gfm: true, breaks: false });

            // ══ ACCENT COLOR ═════════════════════════════════════════════════════════════

            function updateNeutralSwatch() {
                const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
                el.neutralSwatch.style.background = dark ? '#ffffff' : '#000000';
            }

            function applyAccent(name) {
                const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
                let color, fg;
                if (name === 'neutral') {
                    color = dark ? '#ffffff' : '#000000';
                    fg = dark ? '#000000' : '#ffffff';
                } else {
                    const e = ACCENT_MAP[name] ?? ACCENT_MAP.blue;
                    color = e.color; fg = e.fg;
                }
                document.documentElement.style.setProperty('--accent', color);
                document.documentElement.style.setProperty('--accent-fg', fg);
                el.sendBtn.style.color = fg;

                document.querySelectorAll('.color-swatch').forEach(s =>
                    s.classList.toggle('active', s.dataset.accent === name));

                // keep thinking button fg in sync if active
                if (useThinking) el.thinkingBtn.style.color = fg;
            }

            document.querySelectorAll('.color-swatch').forEach(btn => {
                btn.addEventListener('click', () => {
                    localStorage.setItem('lm_accent', btn.dataset.accent);
                    applyAccent(btn.dataset.accent);
                });
            });

            window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
                updateNeutralSwatch();
                applyAccent(localStorage.getItem('lm_accent') || 'blue');
            });

            // ══ THINKING TOGGLE ══════════════════════════════════════════════════════════

            function setThinking(on) {
                useThinking = on;
                el.thinkingBtn.classList.toggle('thinking-on', on);
                if (!on) el.thinkingBtn.style.color = '';
                else el.thinkingBtn.style.color = 'var(--accent-fg)';
                localStorage.setItem('lm_thinking', on);
            }
            el.thinkingBtn.addEventListener('click', () => setThinking(!useThinking));

            // ══ INIT ══════════════════════════════════════════════════════════════════════

            window.addEventListener('load', () => {
                el.serverUrl.value = localStorage.getItem('lm_url') || '';
                el.serverPort.value = localStorage.getItem('lm_port') || '1234';
                el.temperature.value = localStorage.getItem('lm_temp') || '0.7';
                el.tempVal.textContent = parseFloat(localStorage.getItem('lm_temp') || 0.7).toFixed(1);
                // Streaming default ON: localStorage未設定（null）の場合は true
                el.useStream.checked = localStorage.getItem('lm_stream') !== 'false';
                el.displayMode.value = localStorage.getItem('lm_display') || 'markdown';
                el.apiType.value = localStorage.getItem('lm_api_type') || 'openai';

                const keyOn = localStorage.getItem('lm_apikey_on') === 'true';
                el.useApiKey.checked = keyOn;
                el.apiKeyRow.classList.toggle('hidden', !keyOn);
                el.apiKeyInput.value = sessionStorage.getItem('lm_api_key') || '';

                setThinking(localStorage.getItem('lm_thinking') === 'true');
                updateNeutralSwatch();
                applyAccent(localStorage.getItem('lm_accent') || 'blue');

                if (el.serverUrl.value) fetchModels();
            });

            // ══ SETTINGS ══════════════════════════════════════════════════════════════════

            el.openSettings.addEventListener('click', () => {
                el.settingsPanel.classList.add('open');
                el.settingsOverlay.classList.remove('hidden');
            });

            function closeSettings() {
                el.settingsPanel.classList.remove('open');
                el.settingsOverlay.classList.add('hidden');
                saveSettings();
            }
            function saveSettings() {
                localStorage.setItem('lm_url', el.serverUrl.value.trim());
                localStorage.setItem('lm_port', el.serverPort.value.trim());
                localStorage.setItem('lm_temp', el.temperature.value);
                localStorage.setItem('lm_stream', el.useStream.checked);
                localStorage.setItem('lm_display', el.displayMode.value);
                localStorage.setItem('lm_api_type', el.apiType.value);
                localStorage.setItem('lm_apikey_on', el.useApiKey.checked);
                sessionStorage.setItem('lm_api_key', el.apiKeyInput.value);
            }

            el.closeSettingsBtn.addEventListener('click', closeSettings);
            el.settingsOverlay.addEventListener('click', closeSettings);
            el.temperature.addEventListener('input', e => {
                el.tempVal.textContent = parseFloat(e.target.value).toFixed(1);
            });
            el.useApiKey.addEventListener('change', () => {
                el.apiKeyRow.classList.toggle('hidden', !el.useApiKey.checked);
            });

            // Port ± buttons
            el.portMinus.addEventListener('click', () => {
                el.serverPort.value = Math.max(1, (parseInt(el.serverPort.value) || 1234) - 1);
            });
            el.portPlus.addEventListener('click', () => {
                el.serverPort.value = Math.min(65535, (parseInt(el.serverPort.value) || 1234) + 1);
            });

            // Display mode change → re-render all existing message bubbles
            el.displayMode.addEventListener('change', () => {
                document.querySelectorAll('[data-raw]').forEach(target => {
                    renderContent(target, target.dataset.raw);
                });
            });

            // ══ URL & HEADERS ═════════════════════════════════════════════════════════════

            function getBaseUrl() {
                let url = el.serverUrl.value.trim();
                const port = el.serverPort.value.trim();
                if (!url) return '';
                if (!/^https?:\/\//i.test(url)) url = 'http://' + url;
                url = url.replace(/\/+$/, '');
                if (port && !/:\d+$/.test(url.replace(/^https?:\/\//, '').split('/')[0]))
                    url += ':' + port;
                return url;
            }

            function getApiHeaders(isGet = false) {
                const h = {};
                if (!isGet) h['Content-Type'] = 'application/json';
                const key = el.apiKeyInput.value.trim();
                if (el.useApiKey.checked && key) {
                    if (el.apiType.value === 'anthropic') h['x-api-key'] = key;
                    else h['Authorization'] = 'Bearer ' + key;
                }
                if (el.apiType.value === 'anthropic') {
                    h['anthropic-version'] = '2023-06-01';
                    h['anthropic-dangerous-direct-browser-access'] = 'true';
                    if (useThinking) h['anthropic-beta'] = 'interleaved-thinking-2025-02-19';
                }
                return h;
            }

            // ══ MODEL FETCH ═══════════════════════════════════════════════════════════════

            async function fetchModels() {
                const baseUrl = getBaseUrl();
                if (!baseUrl) { showToast('URLを入力してください'); return; }
                el.fetchBtnHeader.textContent = '…';
                el.fetchBtnHeader.disabled = true;
                const path = el.apiType.value === 'lmstudio' ? '/api/v0/models' : '/v1/models';
                try {
                    const res = await fetch(baseUrl + path, {
                        headers: getApiHeaders(true),
                        signal: AbortSignal.timeout(10000),
                    });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    let models = [];
                    if (Array.isArray(data?.data)) models = data.data.map(m => m.id || m.name);
                    else if (Array.isArray(data)) models = data.map(m => m.id || m.name || String(m));
                    if (!models.length) throw new Error('モデルが見つかりませんでした');
                    el.modelSelect.innerHTML = models
                        .map(id => `<option value="${escHtml(id)}">${escHtml(id)}</option>`).join('');
                    el.fetchBtnHeader.textContent = '✓';
                } catch (e) {
                    el.fetchBtnHeader.textContent = 'ERR';
                    showToast('取得失敗: ' + e.message);
                } finally {
                    setTimeout(() => {
                        el.fetchBtnHeader.textContent = 'Fetch';
                        el.fetchBtnHeader.disabled = false;
                    }, 2200);
                }
            }
            el.fetchBtnHeader.addEventListener('click', fetchModels);

            // ══ UTILITIES ════════════════════════════════════════════════════════════════

            function escHtml(s) {
                return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            function safeMarkdown(text) {
                const html = marked.parse(text || '');
                return typeof DOMPurify !== 'undefined'
                    ? DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'rel'] })
                    : html;
            }

            function renderMath(target) {
                if (window._katexReady && typeof renderMathInElement === 'function') {
                    try { renderMathInElement(target, MATH_OPTIONS); } catch (_) { }
                }
            }

            // data-raw stores original text for re-rendering on mode switch
            function renderContent(target, text) {
                target.dataset.raw = text;
                if (el.displayMode.value === 'markdown') {
                    target.innerHTML = safeMarkdown(text);
                    renderMath(target);
                } else {
                    target.textContent = text;
                }
            }

            function scrollToBottom() {
                if (!isAutoScrolling) return;
                el.chatWindow.scrollTo({ top: el.chatWindow.scrollHeight, behavior: 'smooth' });
            }
            el.chatWindow.addEventListener('scroll', () => {
                const dist = el.chatWindow.scrollHeight - el.chatWindow.scrollTop - el.chatWindow.clientHeight;
                isAutoScrolling = dist < 150;
            }, { passive: true });

            el.userInput.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            });

            function showToast(msg, dur = 2800) {
                const t = document.createElement('div');
                t.className = 'bg-gray-900/90 dark:bg-gray-100/90 text-white dark:text-gray-900 text-sm px-4 py-2 rounded-full shadow-lg transition-opacity duration-300 max-w-sm text-center';
                t.textContent = msg;
                el.toastContainer.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, dur);
            }

            // ══ MESSAGE RENDERING ═════════════════════════════════════════════════════════

            function removeWelcome() { document.getElementById('welcome')?.remove(); }

            function appendUserMessage(text) {
                removeWelcome();
                const wrap = document.createElement('div');
                wrap.className = 'flex justify-end';
                const bubble = document.createElement('div');
                bubble.className = 'bg-gray-100 dark:bg-[#2c2c2e] text-gray-900 dark:text-white px-4 py-3 rounded-2xl rounded-tr-md max-w-[82%] break-words text-sm leading-relaxed';
                bubble.textContent = text;
                wrap.appendChild(bubble);
                el.scrollContainer.appendChild(wrap);
                scrollToBottom();
            }

            function appendAssistantMessage() {
                removeWelcome();
                const wrap = document.createElement('div');
                wrap.className = 'msg-ai flex flex-col items-start gap-2 w-full';

                const reasoning = document.createElement('details');
                reasoning.className = 'reasoning-block w-full pl-3 rounded hidden';
                reasoning.innerHTML = `
                <summary class="flex items-center gap-1.5 text-xs text-gray-400 dark:text-gray-500 py-1 select-none">
                    <svg class="reasoning-arrow w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                    </svg>
                    <span class="reasoning-title font-medium">思考プロセス</span>
                </summary>
                <div class="reasoning-body mt-1.5 text-[11px] text-gray-400 dark:text-gray-500 font-mono leading-relaxed whitespace-pre-wrap max-h-56 overflow-y-auto pr-1 pb-1"></div>`;

                const content = document.createElement('div');
                content.className = 'prose w-full text-gray-900 dark:text-white text-sm';
                content.innerHTML = `<span class="text-gray-300 dark:text-gray-600"><span class="thinking-dot">●</span><span class="thinking-dot">●</span><span class="thinking-dot">●</span></span>`;

                wrap.appendChild(reasoning);
                wrap.appendChild(content);
                el.scrollContainer.appendChild(wrap);
                scrollToBottom();

                return {
                    reasoningEl: reasoning,
                    reasoningBody: reasoning.querySelector('.reasoning-body'),
                    reasoningTitle: reasoning.querySelector('.reasoning-title'),
                    contentEl: content,
                };
            }

            function updateReasoning(refs, text, live) {
                refs.reasoningEl.classList.remove('hidden');
                refs.reasoningBody.textContent = text;
                if (live && !refs.reasoningEl.open) refs.reasoningEl.open = true;
                refs.reasoningBody.scrollTop = refs.reasoningBody.scrollHeight;
                scrollToBottom();
            }
            function finalizeReasoning(refs, text) {
                refs.reasoningTitle.textContent = `思考プロセス（約 ${Math.round(text.length / 4).toLocaleString('ja')} tokens）`;
                setTimeout(() => { refs.reasoningEl.open = false; }, 700);
            }

            // ══ SEND ══════════════════════════════════════════════════════════════════════

            el.sendBtn.addEventListener('click', handleSend);
            el.userInput.addEventListener('keydown', e => {
                if (e.isComposing) return;
                if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); handleSend(); }
            });

            async function handleSend() {
                if (isSending) return;
                const content = el.userInput.value.trim();
                const model = el.modelSelect.value;
                const baseUrl = getBaseUrl();
                if (!content) return;
                if (!model) { showToast('モデルを選択してください'); return; }
                if (!baseUrl) { showToast('サーバーURLを設定してください'); return; }

                isSending = true;
                el.sendBtn.disabled = true;
                el.userInput.value = '';
                el.userInput.style.height = 'auto';
                isAutoScrolling = true;

                appendUserMessage(content);
                chatHistory.push({ role: 'user', content });
                const refs = appendAssistantMessage();
                abortCtrl = new AbortController();

                try {
                    let text = '';
                    if (el.apiType.value === 'anthropic')
                        text = await sendAnthropicRequest(model, baseUrl, refs);
                    else
                        text = await sendOpenAIRequest(model, baseUrl, refs);
                    if (text) chatHistory.push({ role: 'assistant', content: text });
                } catch (err) {
                    if (err.name === 'AbortError') {
                        const s = document.createElement('span');
                        s.className = 'text-xs text-gray-400 dark:text-gray-500 ml-1';
                        s.textContent = '（停止）';
                        refs.contentEl.appendChild(s);
                    } else {
                        refs.contentEl.innerHTML = `<span class="text-red-500 dark:text-red-400 text-sm">エラー: ${escHtml(err.message)}</span>`;
                        console.error('[handleSend]', err);
                    }
                } finally {
                    isSending = false; abortCtrl = null;
                    el.sendBtn.disabled = false;
                    scrollToBottom();
                }
            }

            // ══ OPENAI / LM STUDIO ════════════════════════════════════════════════════════

            async function sendOpenAIRequest(model, baseUrl, refs) {
                const path = el.apiType.value === 'lmstudio' ? '/api/v0/chat/completions' : '/v1/chat/completions';
                const stream = el.useStream.checked;
                const res = await fetch(baseUrl + path, {
                    method: 'POST', headers: getApiHeaders(), signal: abortCtrl.signal,
                    body: JSON.stringify({ model, messages: chatHistory, temperature: parseFloat(el.temperature.value), stream }),
                });
                if (!res.ok) { const t = await res.text().catch(() => ''); throw new Error(`HTTP ${res.status}` + (t ? ': ' + t.slice(0, 160) : '')); }

                let fullText = '', fullReasoning = '';
                if (stream) {
                    refs.contentEl.innerHTML = '';
                    const reader = res.body.getReader(), dec = new TextDecoder(); let buf = '';
                    while (true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buf += dec.decode(value, { stream: true });
                        const lines = buf.split('\n'); buf = lines.pop();
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            const raw = line.slice(6).trim(); if (raw === '[DONE]') continue;
                            try {
                                const json = JSON.parse(raw), delta = json.choices?.[0]?.delta ?? {};
                                if (delta.reasoning_content) { fullReasoning += delta.reasoning_content; updateReasoning(refs, fullReasoning, true); }
                                if (delta.content) { fullText += delta.content; renderContent(refs.contentEl, fullText); scrollToBottom(); }
                            } catch (_) { }
                        }
                    }
                    if (fullReasoning) finalizeReasoning(refs, fullReasoning);
                } else {
                    const data = await res.json(), msg = data.choices?.[0]?.message;
                    if (!msg) throw new Error('レスポンス形式が不正です');
                    if (msg.reasoning_content) { fullReasoning = msg.reasoning_content; updateReasoning(refs, fullReasoning, false); finalizeReasoning(refs, fullReasoning); }
                    fullText = msg.content ?? ''; renderContent(refs.contentEl, fullText);
                }
                return fullText;
            }

            // ══ ANTHROPIC ════════════════════════════════════════════════════════════════
            // 思考プロセス (extended thinking) は ★思考ボタンをON★ にする必要があります。
            // 対応モデル: claude-3-7-sonnet-20250219 以降
            // ONにすると: anthropic-beta ヘッダーと thinking パラメータが自動付与されます。

            async function sendAnthropicRequest(model, baseUrl, refs) {
                const stream = el.useStream.checked;
                const body = {
                    model, messages: chatHistory,
                    max_tokens: useThinking ? 16000 : 8192,
                    stream,
                };
                if (useThinking) body.thinking = { type: 'enabled', budget_tokens: 10000 };

                const res = await fetch(baseUrl + '/v1/messages', {
                    method: 'POST', headers: getApiHeaders(), signal: abortCtrl.signal,
                    body: JSON.stringify(body),
                });
                if (!res.ok) { const t = await res.text().catch(() => ''); throw new Error(`HTTP ${res.status}` + (t ? ': ' + t.slice(0, 160) : '')); }

                let fullText = '', fullReasoning = '', currentType = null;
                if (stream) {
                    refs.contentEl.innerHTML = '';
                    const reader = res.body.getReader(), dec = new TextDecoder(); let buf = '';
                    while (true) {
                        const { done, value } = await reader.read(); if (done) break;
                        buf += dec.decode(value, { stream: true });
                        const lines = buf.split('\n'); buf = lines.pop();
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            try {
                                const j = JSON.parse(line.slice(6));
                                switch (j.type) {
                                    case 'content_block_start': currentType = j.content_block?.type ?? null; break;
                                    case 'content_block_delta':
                                        if (j.delta?.type === 'thinking_delta') { fullReasoning += j.delta.thinking ?? ''; updateReasoning(refs, fullReasoning, true); }
                                        else if (j.delta?.type === 'text_delta') { fullText += j.delta.text ?? ''; renderContent(refs.contentEl, fullText); scrollToBottom(); }
                                        break;
                                    case 'content_block_stop':
                                        if (currentType === 'thinking' && fullReasoning) finalizeReasoning(refs, fullReasoning);
                                        currentType = null; break;
                                }
                            } catch (_) { }
                        }
                    }
                } else {
                    const data = await res.json();
                    for (const b of data.content ?? []) {
                        if (b.type === 'thinking') fullReasoning += b.thinking ?? '';
                        else if (b.type === 'text') fullText += b.text ?? '';
                    }
                    if (fullReasoning) { updateReasoning(refs, fullReasoning, false); finalizeReasoning(refs, fullReasoning); }
                    renderContent(refs.contentEl, fullText);
                }
                return fullText;
            }

            // ══ CLEAR ════════════════════════════════════════════════════════════════════

            el.clearBtn.addEventListener('click', () => {
                if (!chatHistory.length) { closeSettings(); return; }
                if (!confirm('チャット履歴をすべて消去しますか？')) return;
                chatHistory = [];
                el.scrollContainer.innerHTML = '';
                const w = document.createElement('div');
                w.id = 'welcome'; w.className = 'text-center py-20 select-none';
                w.innerHTML = `<h2 class="text-xl font-bold text-gray-300 dark:text-gray-600 mb-2">Local AI Chat</h2>
                <p class="text-sm text-gray-400 dark:text-gray-500">設定からサーバーを設定し、<br>会話を開始してください。</p>`;
                el.scrollContainer.appendChild(w);
                closeSettings();
            });

        })();
    </script>
</body>

</html>
